<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basa Gas Web App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Order LPG Refill</h1>
  <form id="orderForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required />
    <label for="cylinder">Cylinder Size (kg):</label>
    <input type="number" id="cylinder" name="cylinder" required min="2" max="7" />
    <button type="submit">Place Order</button>
  </form>
  <p id="response"></p>

  <script src="app.js"></script>
</body>
</html>
